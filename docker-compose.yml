version: '3.8'

services:
  eureka-server:
    image: eureka-server
    container_name: eureka-server
    build:
      context: ./eureka-server
    ports:
      - "8761:8761"
    networks:
      - ecommerce-network

  api-gateway:
    image: api-gateway
    container_name: api-gateway
    build:
      context: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA-SERVER=http://eureka-server:8761/eureka/
      - ALLOWED_ORIGINS=http://localhost:4200
    depends_on:
      - eureka-server
    networks:
      - ecommerce-network

  notification-service:
    image: notification-service
    container_name: notification-service
    build:
      context: ./notification-service
    ports:
      - "9090:9090"
    environment:
      - EUREKA-SERVER=http://eureka-server:8761/eureka/
      - MAIL_HOST=172.18.0.4
      - MAIL_PORT=1025
      - MAIL_USERNAME=brody
      - MAIL_PASSWORD=brody
      - EMAIL_SYSTEM=notification@bank.com
    depends_on:
      - eureka-server
      - api-gateway
    networks:
      - ecommerce-network

  user-service:
    image: user-service
    container_name: user-service
    build:
      context: ./user-service
    ports:
      - "8083:8083"
    environment:
      - EUREKA-SERVER=http://eureka-server:8761/eureka/
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_HOST=172.18.0.2
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=ecommerce
      - JWT_SECRET=AaZzBbCcYyDdXxEeWwFf
      - JWT_EXPIRATION=604800000
    depends_on:
      - eureka-server
      - api-gateway
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    external: true